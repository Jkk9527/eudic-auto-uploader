# Playwright 浏览器是否无头运行 (true = 不显示 Chromium 窗口)
headless: 0

# 控制是否执行下载/上传
enable_fetch: true
enable_upload: true

# 起始年份 (含)，与 year_end 一起限定下载范围
year_from: 2026

# 下载最新的几个 (-1 代表下载所有，正整数代表只下载最新的 N 个)
latest_num: -1

# 结束年份(含)。不写则使用代码默认值，不限制上限。
year_end: 2026

# 下载文件保存的主目录
download_folder: "rss_download"
